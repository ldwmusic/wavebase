  <!-- Same script chain as the rest of the site. api-client.js
       populates WAVEBASE_DATA which admin.js uses to resolve
       spot_ids → friendly names in the user-detail modal. -->
  <!-- Scroll buddy: a small goose paddling down a dotted swell-line as a
       scroll-progress indicator, banking with scroll speed (Lab1 port, Lode
       18 Jun — on every page). Body-level + pointer-events:none. Wide
       screens only; JS fills the goose + drives it along the path. -->
  <div class="buddy" id="buddy" aria-hidden="true">
    <svg class="buddy-track" viewBox="0 0 56 560" fill="none" aria-hidden="true">
      <path id="buddy-path" d="M28,12 C52,82 4,152 28,222 C52,292 4,362 28,432 C44,482 36,516 28,548" stroke="currentColor" stroke-width="2" stroke-dasharray="1 9" stroke-linecap="round"/>
    </svg>
    <div class="buddy-goose" id="buddy-goose"></div>
  </div>
